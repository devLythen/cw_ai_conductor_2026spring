name: CI

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'
      - '[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze Flutter project
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

      - name: Run Rust tests
        run: cargo test --manifest-path rust/Cargo.toml

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.95.0

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Compute version metadata
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION_LABEL="${GITHUB_REF_NAME}"
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [[ "${TAG_VERSION}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([+-][0-9A-Za-z.-]+)?$ ]]; then
              BUILD_NAME="${TAG_VERSION%%+*}"
              BUILD_NAME="${BUILD_NAME%%-*}"
            else
              BUILD_NAME="1.0.0"
            fi
          else
            VERSION_LABEL="${GITHUB_SHA}"
            BUILD_NAME="1.0.0"
          fi

          BUILD_NUMBER="${GITHUB_RUN_NUMBER}"
          ASSET_NAME="cw_ai_conductor_2026spring-${VERSION_LABEL}-macos.zip"

          echo "VERSION_LABEL=${VERSION_LABEL}" >> "${GITHUB_ENV}"
          echo "BUILD_NAME=${BUILD_NAME}" >> "${GITHUB_ENV}"
          echo "BUILD_NUMBER=${BUILD_NUMBER}" >> "${GITHUB_ENV}"
          echo "ASSET_NAME=${ASSET_NAME}" >> "${GITHUB_ENV}"
          echo "version-label=${VERSION_LABEL}" >> "${GITHUB_OUTPUT}"
          echo "build-name=${BUILD_NAME}" >> "${GITHUB_OUTPUT}"
          echo "build-number=${BUILD_NUMBER}" >> "${GITHUB_OUTPUT}"
          echo "asset-name=${ASSET_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Build macOS app
        run: flutter build macos --release --build-name "${BUILD_NAME}" --build-number "${BUILD_NUMBER}"

      - name: Package macOS app
        shell: bash
        run: ditto -c -k --sequesterRsrc --keepParent build/macos/Build/Products/Release/cw_ai_conductor_2026spring.app "${ASSET_NAME}"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_NAME }}
          path: ${{ env.ASSET_NAME }}
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build-macos
    if: github.ref_type == 'tag'

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: cw_ai_conductor_2026spring-${{ github.ref_name }}-macos.zip
          path: release-assets

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release-assets/cw_ai_conductor_2026spring-${{ github.ref_name }}-macos.zip
